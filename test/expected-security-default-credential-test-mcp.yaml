server:
  name: openapi-server
  securitySchemes:
    - id: ApiKeyHeaderAuth
      type: apiKey
      in: header
      name: X-API-KEY
      defaultCredential: header-key
    - id: ApiKeyQueryAuth
      type: apiKey
      in: query
      name: api_key
      defaultCredential: query-key
    - id: BasicAuth
      type: http
      scheme: basic
      defaultCredential: basic-user-pass
    - id: BearerAuth
      type: http
      scheme: bearer
      defaultCredential: bearer-token
tools:
  - name: getHello
    description: Get hello
    args: []
    requestTemplate:
      url: http://localhost:8080/hello
      method: GET
    responseTemplate: {}
